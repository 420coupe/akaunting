server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Increase body size for file uploads (matches FILESYSTEM_MAX_SIZE)
    client_max_body_size 20M;

    # ---------- Health check (handled by nginx directly, no PHP needed) ----------
    location = /healthcheck {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ---------- Public assets via /public/ prefix ----------
    # Akaunting views call asset('public/css/...') which generates /public/css/... URLs.
    # Map those back to the actual files under the document root.
    location ^~ /public/ {
        alias /var/www/html/public/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ---------- Static assets ----------
    location ~* \.(ico|gif|jpg|jpeg|png|woff|woff2|eot|ttf|svg|xls|xlsx)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # JS/CSS — try disk first, then fall through to PHP (needed for Livewire and other dynamic assets)
    location ~* \.(js|css)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri /index.php?$query_string;
    }

    # ---------- Main Laravel route ----------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---------- Security: block direct access to sensitive files ----------
    location ~ \.(env|log)$ {
        deny all;
    }

    # Block direct access to protected directories
    location ~ ^/(app|bootstrap|config|database|overrides|resources|routes|storage|tests|artisan) {
        deny all;
    }

    # Block direct access to modules/vendor internals (allow assets only)
    location ~ ^/modules\/(.*)\.((?!ico|gif|jpg|jpeg|png|js\b|css|less|sass|font|woff|woff2|eot|ttf|svg|xls|xlsx).)*$ {
        deny all;
    }

    # Block hidden files except .well-known
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ---------- PHP-FPM ----------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Route to the app container over TCP (no Unix socket in Docker)
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        include fastcgi_params;

        # Must come after include to avoid being overridden
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        # All traffic reaching this nginx comes from NPM over HTTPS — force these on
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTPS on;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 120s;
    }

    error_page 404 /index.php;
    error_log  /var/log/nginx/akaunting-error.log;
    access_log /var/log/nginx/akaunting-access.log;
}
